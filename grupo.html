<script>
    let file1Data = null, file2Data = null;
    let currentVoucherElement = null;
    
    function identifySheetType(jsonData) {
        for (let i = 0; i < Math.min(15, jsonData.length); i++) {
            const row = jsonData[i];
            if (!row) continue;
            const rowStr = row.join(" ").toLowerCase();
            if (rowStr.includes("total previsto")) return "VALORES";
            if ((rowStr.includes("check-out") || rowStr.includes("checkout")) && (rowStr.includes("categor") || rowStr.includes("adult"))) return "HOSPEDES";
            if (row.includes("Nº") && row.includes("Total Previsto")) return "VALORES";
        }
        return "HOSPEDES";
    }
    
    function extractValoresData(jsonData) {
        const map = new Map();
        let headerRow = null;
        for (let i = 0; i < Math.min(20, jsonData.length); i++) {
            const row = jsonData[i];
            if (row && (row[0] === "Nº" || (row[0] && row[0].toString().trim() === "Nº"))) {
                headerRow = row;
                break;
            }
        }
        if (!headerRow) return map;
        
        const idxNum = headerRow.indexOf("Nº");
        const idxTotal = headerRow.indexOf("Total Previsto");
        const idxEmpresa = headerRow.indexOf("Empresa");
        
        if (idxNum === -1) return map;
        
        for (let i = headerRow.indexOf("Nº") + 1; i < jsonData.length; i++) {
            const row = jsonData[i];
            if (!row || row.length < 2) continue;
            const num = row[idxNum] ? String(row[idxNum]).trim() : "";
            if (!num || !/^\d+$/.test(num)) continue;
            
            let total = 0;
            if (idxTotal >= 0 && row[idxTotal]) {
                const valStr = String(row[idxTotal]).replace(/[^0-9,.-]/g, '').replace(',', '.');
                total = parseFloat(valStr) || 0;
            }
            const empresa = (idxEmpresa >= 0 && row[idxEmpresa]) ? String(row[idxEmpresa]).trim() : "UNIMED LESTE FLUMINENSE";
            map.set(num, { total, empresa });
        }
        return map;
    }
    
    function extractHospedesData(jsonData) {
        const map = new Map();
        let i = 0;
        while (i < jsonData.length) {
            const row = jsonData[i];
            if (!row || row.length < 6) { i++; continue; }
            
            const numRaw = row[3];
            const checkinRaw = row[4];
            const isBooking = numRaw && (typeof numRaw === 'number' || /^\d+$/.test(String(numRaw).trim())) && 
                              checkinRaw && String(checkinRaw).match(/\d{2}\/\d{2}\/\d{4}/);
            
            if (isBooking) {
                const num = String(numRaw).trim();
                const checkin = String(checkinRaw).trim();
                let checkout = "";
                if (row[9] && row[9].trim) {
                    checkout = String(row[9]).trim();
                } else if (row[9]) {
                    checkout = String(row[9]).trim();
                }
                
                if (!checkout.match(/\d{2}\/\d{2}\/\d{4}/)) {
                    if (row[10] && String(row[10]).match(/\d{2}\/\d{2}\/\d{4}/)) {
                        checkout = String(row[10]).trim();
                    }
                }
                
                const guests = [];
                let j = i + 1;
                while (j < jsonData.length) {
                    const nextRow = jsonData[j];
                    if (!nextRow || nextRow.length < 5) { j++; continue; }
                    const nextNum = nextRow[3];
                    const isNextBooking = nextNum && (typeof nextNum === 'number' || /^\d+$/.test(String(nextNum).trim()));
                    if (isNextBooking) break;
                    
                    const guestName = nextRow[4] ? String(nextRow[4]).trim() : "";
                    if (guestName && guestName.length > 1 && !guestName.match(/^Check-in$|^Check-out$|^Categoría$|^Adult\.$|^Crian\.$|^Hóspede$|^País$|^BR$/i)) {
                        guests.push(guestName);
                    }
                    j++;
                }
                if (guests.length === 0) guests.push("Hóspede não informado");
                
                map.set(num, { guests, checkin, checkout });
                i = j;
            } else {
                i++;
            }
        }
        return map;
    }
    
    function processFile(file, areaCode, statusId, nameId) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
            
            const tipo = identifySheetType(jsonData);
            let extractedData = null;
            
            if (tipo === "VALORES") {
                extractedData = extractValoresData(jsonData);
                document.getElementById(statusId).innerHTML = `✅ VALORES (${extractedData.size} reservas)`;
            } else {
                extractedData = extractHospedesData(jsonData);
                document.getElementById(statusId).innerHTML = `✅ HÓSPEDES (${extractedData.size} reservas)`;
            }
            
            document.getElementById(nameId).innerHTML = `📄 ${file.name}`;
            document.getElementById(statusId).style.color = "#2e7d32";
            
            if (areaCode === "area1") {
                file1Data = { tipo, dados: extractedData };
            } else {
                file2Data = { tipo, dados: extractedData };
            }
            
            checkReadyToProcess();
        };
        reader.readAsArrayBuffer(file);
    }
    
    function checkReadyToProcess() {
        const btn = document.getElementById('btnProcessar');
        const msg = document.getElementById('statusMsg');
        
        if (file1Data && file2Data) {
            if ((file1Data.tipo === "VALORES" && file2Data.tipo === "HOSPEDES") ||
                (file1Data.tipo === "HOSPEDES" && file2Data.tipo === "VALORES")) {
                btn.disabled = false;
                msg.innerHTML = '✅ Arquivos OK! Clique para gerar o voucher.';
                msg.className = 'status success';
            } else {
                btn.disabled = true;
                msg.innerHTML = '⚠️ Dois arquivos do mesmo tipo.';
                msg.className = 'status error';
            }
        } else {
            btn.disabled = true;
            msg.innerHTML = '📌 Aguardando o segundo arquivo...';
            msg.className = 'status info';
        }
    }
    
    function buildGuestsGrid(guests) {
        if (!guests || guests.length === 0) {
            return '<div style="font-size: 11px; color: #888; padding: 5px;">Nenhum hóspede listado</div>';
        }
        
        let guestsHtml = '<div class="guests-grid">';
        guests.forEach(guest => {
            guestsHtml += `
                <div class="guest-card">
                    <div class="guest-icon">👤</div>
                    <div class="guest-name">${escapeHtml(guest)}</div>
                </div>
            `;
        });
        guestsHtml += '</div>';
        return guestsHtml;
    }

                        <span style="font-size: 11px; color: #2d5a2c; background: #e8f0e8; padding: 3px 10px; border-radius: 20px; font-weight: 600;">📅 Check-in: ${checkinDisplay} → Check-out: ${checkoutDisplay}</span>
                        <span style="font-weight: 800; color: #1e6f3f; font-size: 13px; background: #e6f4ea; padding: 4px 10px; border-radius: 20px;">💰 ${valorStr}</span>
                    </div>

                        <span>🏷️ HÓSPEDES</span>

                    </div>
                    ${guestsGridHtml}

            `;
        });
        
        // HTML com centralização garantida para e-mail
        const htmlContent = `<!DOCTYPE html>

    async function copyVoucherWithFormatting() {
        if (!currentVoucherElement) {
            showToast("❌ Gere o voucher primeiro!", "#c2410c");
            return;
        }
        
        try {
            const voucherTable = currentVoucherElement.querySelector('table') || currentVoucherElement;
            const range = document.createRange();
            range.selectNodeContents(voucherTable);
            const selection = window.getSelection();
            selection?.removeAllRanges();
            selection?.addRange(range);
            const success = document.execCommand('copy');
            selection?.removeAllRanges();
            
            if (success) {
                showToast("✅ Voucher copiado! Cole no e-mail (Ctrl+V) - Centralizado", "#1e8a4d");
                highlightCopyButton();
            } else {
                throw new Error('execCommand falhou');
            }
        } catch (err) {
            try {
                const htmlContent = currentVoucherElement.outerHTML;
                await navigator.clipboard.writeText(htmlContent);
                showToast("✅ Voucher copiado (HTML). Cole no e-mail", "#f5a623");
                highlightCopyButton();
            } catch (err2) {
                showToast("❌ Selecione o voucher manualmente e pressione Ctrl+C", "#c2410c");
            }
        }
    }
    
    function highlightCopyButton() {
        const btn = document.getElementById('btnCopiarVoucher');
        if (!btn) return;
        const originalText = btn.innerHTML;
        btn.innerHTML = '✅ Copiado!';
        setTimeout(() => {
            btn.innerHTML = originalText;
        }, 2000);
    }
    
    function showToast(message, bgColor = "#1e2f5e") {
        const toast = document.getElementById('toastMsg');
        toast.textContent = message;
        toast.style.backgroundColor = bgColor;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3500);
    }
    
    function generateVoucher() {
        if (!file1Data || !file2Data) return;
        
        let valoresMap, hospedesMap;
        if (file1Data.tipo === "VALORES") {
            valoresMap = file1Data.dados;
            hospedesMap = file2Data.dados;
        } else {
            valoresMap = file2Data.dados;
            hospedesMap = file1Data.dados;
        }
        
        const bookings = [];
        let totalGeral = 0;
        let empresaPrincipal = "UNIMED LESTE FLUMINENSE";
        
        for (let [num, hosp] of hospedesMap.entries()) {
            const valor = valoresMap.get(num) || { total: 0, empresa: "UNIMED LESTE FLUMINENSE" };
            if (valor.empresa) empresaPrincipal = valor.empresa;
            totalGeral += valor.total || 0;
            
            bookings.push({
                numero: num,
                checkin: hosp.checkin || "—",
                checkout: hosp.checkout || "—",
                guests: hosp.guests,
                total: valor.total || 0
            });
        }
        
        bookings.sort((a,b) => {
            const da = a.checkin.split('/').reverse().join('');
            const db = b.checkin.split('/').reverse().join('');
            return da.localeCompare(db);
        });
        
        currentVoucherElement = buildVoucherElement(bookings, totalGeral, empresaPrincipal);
        
        const container = document.getElementById('vouchersContainer');
        container.innerHTML = `
            <div style="width:100%; display: flex; flex-direction: column; align-items: center;">
                <div class="voucher-actions" style="width:561px;">
                    <button class="btn-copiar" id="btnCopiarVoucher">📋 Copiar Voucher com Formatação</button>
                </div>
                <div id="voucherDisplay"></div>
            </div>
        `;
        
        document.getElementById('voucherDisplay').appendChild(currentVoucherElement);
        
        const copyBtn = document.getElementById('btnCopiarVoucher');
        if (copyBtn) copyBtn.addEventListener('click', copyVoucherWithFormatting);
        
        document.getElementById('statusMsg').innerHTML = `✅ Voucher gerado com ${bookings.length} reservas | Total: R$ ${totalGeral.toFixed(2).replace('.',',')}`;
        document.getElementById('statusMsg').className = 'status success';
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function setupFileInput(inputId, areaId, statusId, nameId, areaCode) {
        const input = document.getElementById(inputId);
        const area = document.getElementById(areaId);
        
        area.addEventListener('click', () => input.click());
        input.addEventListener('change', (e) => {
            if (e.target.files && e.target.files.length) {
                area.classList.add('has-file');
                processFile(e.target.files[0], areaCode, statusId, nameId);
            }
        });
        area.addEventListener('dragover', (e) => { e.preventDefault(); area.style.background = '#f1f5f9'; });
        area.addEventListener('dragleave', () => { area.style.background = '#f8fafc'; });
        area.addEventListener('drop', (e) => {
            e.preventDefault();
            area.style.background = '#f8fafc';
            const file = e.dataTransfer.files[0];
            if (file && (file.name.endsWith('.xlsx') || file.name.endsWith('.xls'))) {
                area.classList.add('has-file');
                processFile(file, areaCode, statusId, nameId);
            } else {
                alert('Envie arquivo .xlsx ou .xls');
            }
        });
    }
    
    setupFileInput('fileInput1', 'dropArea1', 'status1', 'fileName1', 'area1');
    setupFileInput('fileInput2', 'dropArea2', 'status2', 'fileName2', 'area2');
    document.getElementById('btnProcessar').addEventListener('click', generateVoucher);
</script>
