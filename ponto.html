    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
            padding: 30px;
        }

        .controls {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #e9ecef;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        .search-box, select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .search-box:focus, select:focus, input[type="number"]:focus {
            outline: none;
            border-color: #3498db;
        }

        .employee-list {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            background: white;
        }

        .employee-item {
            padding: 12px;
            border-bottom: 1px solid #e9ecef;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .employee-item:hover {
            background-color: #f8f9fa;
        }

        .employee-item.selected {
            background-color: #e3f2fd;
            border-left: 4px solid #2196f3;
        }

        .employee-info {
            flex: 1;
        }

        .employee-name {
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.9em;
        }

        .employee-role {
            font-size: 0.8em;
            color: #7f8c8d;
        }

        .employee-order {
            background: #3498db;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: bold;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #219a52;
            transform: translateY(-2px);
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }

        .btn-warning:hover {
            background: #e67e22;
            transform: translateY(-2px);
        }

        .preview-area {
            background: white;
            border: 2px dashed #bdc3c7;
            border-radius: 10px;
            padding: 25px;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .preview-area h3 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .card-preview {
            width: 86mm;
            height: 190mm;
            font-family: 'Courier New', monospace;
            font-size: 13.455px;
            line-height: 1.3;
            background: white;
            position: relative;
            overflow: hidden;
            border: 1px solid #ccc;
        }

        .card-content {
            padding: 3mm;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .variable-field {
            position: absolute;
            font-weight: bold;
            white-space: nowrap;
        }

        .horario-field {
            font-size: 11.44px;
        }

        .n-ordem { top: 6mm; left: 4mm; }
        .empregador { top: 6mm; left: 39mm; }
        .atividade-economica { top: 13mm; left: 4mm; }
        .cnpj { top: 13mm; left: 39mm; }
        .endereco { top: 18mm; left: 4mm; }
        .funcionario { top: 23mm; left: 4mm; width: 75mm; }
        .ctps { top: 28mm; left: 4mm; width: 18mm; }
        .registro { top: 28mm; left: 24mm; width: 18mm; }
        .funcao { top: 40mm; left: 48mm; width: 35mm; }
        .mes { top: 34mm; left: 4mm; }
        .ano { top: 34mm; left: 54mm; }
        .entrada { top: 48mm; left: 19mm; }
        .intervalo { top: 48mm; left: 34mm; }
        .saida { top: 48mm; left: 54mm; }
        .escala { top: 48mm; left: 66mm; }

        .selected-count {
            background: #e74c3c;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            margin-left: 10px;
        }

        .bulk-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .bulk-btn {
            padding: 8px 16px;
            border: 1px solid #3498db;
            background: white;
            color: #3498db;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .bulk-btn:hover {
            background: #3498db;
            color: white;
        }

        .month-selector {
            display: flex;
            gap: 10px;
        }

        .month-selector .form-group {
            flex: 2;
        }

        .month-selector .form-group:last-child {
            flex: 1;
        }

        .file-input {
            display: none;
        }

        .file-label {
            display: block;
            padding: 12px 24px;
            background: #f39c12;
            color: white;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            flex: 1;
        }

        .file-label:hover {
            background: #e67e22;
            transform: translateY(-2px);
        }

        .scale-selector {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }

        .scale-option {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .scale-option input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .scale-option label {
            display: inline;
            margin: 0;
            font-weight: normal;
            cursor: pointer;
        }

        .import-status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            display: none;
        }

        .import-status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .import-status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .debug-panel {
            margin-top: 15px;
            padding: 10px;
            background: #2c3e50;
            color: #ecf0f1;
            border-radius: 6px;
            font-size: 11px;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .debug-panel.show {
            display: block;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .preview-area {
                min-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Sistema de Cartão de Ponto</h1>
        </div>
        
        <div class="main-content">
            <div class="controls">
                <div class="bulk-actions">
                    <button class="bulk-btn" onclick="selectAll()">Selecionar Todos</button>
                    <button class="bulk-btn" onclick="deselectAll()">Limpar Seleção</button>
                </div>

                <div class="form-group month-selector">
                    <div class="form-group">
                        <label>Mês:</label>
                        <select id="monthSelect">
                            <option value="JANEIRO">Janeiro</option>
                            <option value="FEVEREIRO">Fevereiro</option>
                            <option value="MARÇO">Março</option>
                            <option value="ABRIL">Abril</option>
                            <option value="MAIO">Maio</option>
                            <option value="JUNHO" selected>Junho</option>
                            <option value="JULHO">Julho</option>
                            <option value="AGOSTO">Agosto</option>
                            <option value="SETEMBRO">Setembro</option>
                            <option value="OUTUBRO">Outubro</option>
                            <option value="NOVEMBRO">Novembro</option>
                            <option value="DEZEMBRO">Dezembro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Ano:</label>
                        <input type="number" id="yearInput" value="2025" min="1900" max="2100">
                    </div>
                </div>

                <div class="form-group">
                    <label>Buscar Funcionário:</label>
                    <input type="text" class="search-box" id="searchInput" placeholder="Digite o nome ou função..." onkeyup="filterEmployees()">
                </div>

                <div class="form-group">
                    <label>Funcionários <span id="selectedCount" class="selected-count">0</span>:</label>
                    <div class="employee-list" id="employeeList"></div>
                </div>

                <div class="form-group">
                    <label>Escala Padrão para Novos Cartões:</label>
                    <div class="scale-selector" id="scaleSelector">
                        <div class="scale-option">
                            <input type="radio" name="defaultScale" id="scale12_36" value="12/36" checked>
                            <label for="scale12_36">12/36</label>
                        </div>
                        <div class="scale-option">
                            <input type="radio" name="defaultScale" id="scale6_1" value="6/1">
                            <label for="scale6_1">6/1</label>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="generateSelected()">Imprimir Selecionados</button>
                    <button class="btn btn-success" onclick="generateAll()">Imprimir Todos</button>
                    <button class="btn btn-warning" onclick="exportToExcel()">Exportar Excel</button>
                    <label for="excelFile" class="file-label">Importar Excel</label>
                    <input type="file" id="excelFile" class="file-input" accept=".xlsx, .xls" onchange="importFromExcel(event)">
                </div>
                <div id="importStatus" class="import-status"></div>
                <button class="bulk-btn" onclick="toggleDebug()" style="margin-top: 10px;">🐛 Debug</button>
                <div id="debugPanel" class="debug-panel"></div>
            </div>

            <div class="preview-area">
                <h3>Pré-visualização do Cartão</h3>
                <div class="card-preview" id="cardPreview"></div>
            </div>
        </div>
    </div>

        // Função para adicionar log ao debug
        function addDebugLog(message, data = null) {
            const debugPanel = document.getElementById('debugPanel');
            const timestamp = new Date().toLocaleTimeString();
            let logMessage = `[${timestamp}] ${message}`;
            if (data) {
                logMessage += `\n${JSON.stringify(data, null, 2)}`;
            }
            debugPanel.innerHTML += `<div style="border-bottom:1px solid #555; padding: 5px 0;">${logMessage.replace(/\n/g, '<br>')}</div>`;
            debugPanel.scrollTop = debugPanel.scrollHeight;
            console.log(message, data);
        }

        function toggleDebug() {
            const panel = document.getElementById('debugPanel');
            panel.classList.toggle('show');
        }

        // Inicializar
        function initializeApp() {
            employees = JSON.parse(JSON.stringify(initialEmployees));
            renderEmployeeList();
            updateSelectedCount();
            if (employees.length > 0) {
                showPreview(employees[0]);
            }
            document.getElementById('monthSelect').addEventListener('change', updatePreview);
            document.getElementById('yearInput').addEventListener('change', updatePreview);
            
            const scaleRadios = document.querySelectorAll('input[name="defaultScale"]');
            scaleRadios.forEach(radio => {
                radio.addEventListener('change', updatePreview);
            });
            
            addDebugLog('Sistema inicializado', { totalEmployees: employees.length });
        }

        function getDefaultScale() {
            const selectedScale = document.querySelector('input[name="defaultScale"]:checked');
            return selectedScale ? selectedScale.value : "12/36";
        }

        function updatePreview() {
            if (selectedEmployees.size > 0) {
                const firstSelectedId = Array.from(selectedEmployees)[0];
                const employee = employees.find(emp => emp.id === firstSelectedId);
                if (employee) showPreview(employee);
            } else if (employees.length > 0) {
                showPreview(employees[0]);
            }
        }

        function renderEmployeeList(filteredEmployees = employees) {
            const employeeList = document.getElementById('employeeList');
            employeeList.innerHTML = '';

            filteredEmployees.forEach(employee => {
                const isSelected = selectedEmployees.has(employee.id);
                const employeeItem = document.createElement('div');
                employeeItem.className = `employee-item ${isSelected ? 'selected' : ''}`;
                employeeItem.onclick = () => toggleEmployee(employee.id);
                
                employeeItem.innerHTML = `
                    <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleEmployee(${employee.id})">
                    <div class="employee-order">${employee.id}</div>
                    <div class="employee-info">
                        <div class="employee-name">${employee.name}</div>
                        <div class="employee-role">${employee.role} • Adm: ${employee.admission} • Escala: ${employee.escala}</div>
                    </div>
                `;
                
                employeeList.appendChild(employeeItem);
            });
        }

        function toggleEmployee(employeeId) {
            if (selectedEmployees.has(employeeId)) {
                selectedEmployees.delete(employeeId);
            } else {
                selectedEmployees.add(employeeId);
            }
            updateSelectedCount();
            renderEmployeeList();
            
            const employee = employees.find(emp => emp.id === employeeId);
            if (employee) {
                showPreview(employee);
            }
        }

        function selectAll() {
            employees.forEach(employee => selectedEmployees.add(employee.id));
            updateSelectedCount();
            renderEmployeeList();
        }

        function deselectAll() {
            selectedEmployees.clear();
            updateSelectedCount();
            renderEmployeeList();
        }

        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = selectedEmployees.size;
        }

        function filterEmployees() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = employees.filter(employee => 
                employee.name.toLowerCase().includes(searchTerm) ||
                employee.role.toLowerCase().includes(searchTerm)
            );
            renderEmployeeList(filtered);
        }

        function getMonthYear() {
            const month = document.getElementById('monthSelect').value;
            const year = document.getElementById('yearInput').value;
            return { month, year };
        }

                </div>

        function generateSelected() {
            if (selectedEmployees.size === 0) {
                alert('Por favor, selecione pelo menos um funcionário.');
                return;
            }

            printCards(employees);
        }

        function exportToExcel() {
            const data = employees.map(emp => ({
                'Nº Ordem': emp.id,
                'Nome': emp.name,
                'Função': emp.role,
                'Admissão': emp.admission,
                'Entrada': emp.entrada,
                'Intervalo': emp.intervalo,
                'Saída': emp.saida,
                'Escala': emp.escala,
                'CTPS': emp.ctps,
                'Registro': emp.registro
            }));

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Funcionários");
            XLSX.writeFile(wb, "cartoes_ponto_funcionarios.xlsx");
            addDebugLog('Excel exportado', { totalRows: data.length });
        }

        // Função de importação CORRIGIDA
        function importFromExcel(event) {
            const file = event.target.files[0];
            if (!file) {
                addDebugLog('Nenhum arquivo selecionado');
                return;
            }

            addDebugLog('Iniciando importação do arquivo', { fileName: file.name, fileSize: file.size });
            
            const statusDiv = document.getElementById('importStatus');
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    addDebugLog('Arquivo lido, processando...');
                    
                    const workbook = XLSX.read(data, { type: 'array' });
                    addDebugLog('Workbook lido', { sheetNames: workbook.SheetNames });
                    
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
                    
                    addDebugLog('Dados convertidos para JSON', { 
                        totalRows: jsonData.length,
                        firstRow: jsonData[0],
        columnNames: Object.keys(jsonData[0] || {})
                    });
                    
                    let updatedCount = 0;
                    let notFoundCount = 0;
                    const notFoundIds = [];
                    const updatedIds = [];
                    
                    jsonData.forEach((row, index) => {
                        // Procura o número de ordem em várias colunas possíveis
                        let ordemValue = row['Nº Ordem'] || row['N Ordem'] || row['Nº'] || row['Ordem'] || row['id'];
                        
                        // Se não encontrou, tenta pegar a primeira coluna (assumindo que é o ID)
                        if (!ordemValue && Object.keys(row).length > 0) {
                            const firstKey = Object.keys(row)[0];
                            ordemValue = row[firstKey];
                            addDebugLog(`Usando primeira coluna como ID: ${firstKey} = ${ordemValue}`);
                        }
                        
                        const ordemNum = parseInt(ordemValue);
                        
                        if (!isNaN(ordemNum)) {
                            const employeeIndex = employees.findIndex(emp => emp.id === ordemNum);
                            
                            if (employeeIndex !== -1) {
                                // Atualiza os dados
                                if (row['Nome'] !== undefined && row['Nome'] !== "") employees[employeeIndex].name = String(row['Nome']).trim();
                                if (row['Função'] !== undefined && row['Função'] !== "") employees[employeeIndex].role = String(row['Função']).trim();
                                if (row['Admissão'] !== undefined && row['Admissão'] !== "") employees[employeeIndex].admission = String(row['Admissão']).trim();
                                if (row['Entrada'] !== undefined && row['Entrada'] !== "") employees[employeeIndex].entrada = String(row['Entrada']).trim();
                                if (row['Intervalo'] !== undefined && row['Intervalo'] !== "") employees[employeeIndex].intervalo = String(row['Intervalo']).trim();
                                if (row['Saída'] !== undefined && row['Saída'] !== "") employees[employeeIndex].saida = String(row['Saída']).trim();
                                if (row['Escala'] !== undefined && row['Escala'] !== "") employees[employeeIndex].escala = String(row['Escala']).trim();
                                if (row['CTPS'] !== undefined && row['CTPS'] !== "") employees[employeeIndex].ctps = String(row['CTPS']).trim();
                                if (row['Registro'] !== undefined && row['Registro'] !== "") employees[employeeIndex].registro = String(row['Registro']).trim();
                                
                                updatedCount++;
                                updatedIds.push(ordemNum);
                            } else {
                                notFoundCount++;
                                notFoundIds.push(ordemNum);
                            }
                        } else {
                            addDebugLog(`Linha ${index + 1} - ID inválido:`, ordemValue);
                        }
                    });
                    
                    addDebugLog('Importação concluída', {
                        updatedCount,
                        notFoundCount,
                        updatedIds,
                        notFoundIds
                    });
                    
                    renderEmployeeList();
                    updateSelectedCount();
                    updatePreview();
                    
                    let message = `✅ ${updatedCount} funcionários atualizados com sucesso!`;
                    if (notFoundCount > 0) {
                        message += `\n⚠️ ${notFoundCount} não encontrados (IDs: ${notFoundIds.join(', ')})`;
                    }
                    
                    statusDiv.className = 'import-status success';
                    statusDiv.textContent = message;
                    
                    setTimeout(() => {
                        statusDiv.className = 'import-status';
                    }, 5000);
                    
                    event.target.value = '';
                    
                } catch (error) {
                    addDebugLog('ERRO na importação:', { message: error.message, stack: error.stack });
                    statusDiv.className = 'import-status error';
                    statusDiv.textContent = `❌ Erro: ${error.message}`;
                    setTimeout(() => {
                        statusDiv.className = 'import-status';
                    }, 5000);
                }
            };
            
            reader.onerror = function(error) {
                addDebugLog('Erro ao ler arquivo:', error);
                statusDiv.className = 'import-status error';
                statusDiv.textContent = 'Erro ao ler o arquivo.';
                setTimeout(() => {
                    statusDiv.className = 'import-status';
                }, 5000);
            };
            
            reader.readAsArrayBuffer(file);
        }

        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
