<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FNRH Turismo - Cadastro de Hóspede | LGPD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        .form-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .form-header {
            background: linear-gradient(135deg, #0f4c4f, #0a2e30);
            padding: 1.2rem 2rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .form-header h1 {
            font-weight: 600;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .lgpd-badge {
            background: rgba(255,255,240,0.15);
            backdrop-filter: blur(4px);
            padding: 0.4rem 1rem;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-body {
            padding: 2rem 2rem 1.8rem;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 1.8rem;
        }

        .form-group {
            flex: 1 1 240px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .full-width {
            flex: 1 1 100%;
        }

        label {
            font-weight: 600;
            color: #1e2f35;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        label i {
            color: #2c7a6e;
        }

        input, select, textarea {
            padding: 12px 14px;
            border: 1.5px solid #dce5ec;
            border-radius: 18px;
            font-size: 0.95rem;
            transition: 0.2s;
            background-color: #fefefe;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2c9c8a;
            box-shadow: 0 0 0 3px rgba(44, 156, 138, 0.2);
        }

        .checkbox-group {
            flex-direction: row;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 28px;
        }

        .checkbox-group label {
            font-weight: normal;
            gap: 8px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #2c7a6e;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 1.5rem 0 0.8rem 0;
            color: #0b3b3f;
            border-left: 5px solid #2c9c8a;
            padding-left: 15px;
        }

        .buttons-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
            border-top: 1px solid #e2edf2;
            padding-top: 1.8rem;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
        }

        .btn-primary {
            background: #0f6b62;
            color: white;
        }

        .btn-primary:hover {
            background: #0a4e47;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #eef2f5;
            color: #2c4b4f;
            border: 1px solid #cbdae2;
        }

        .btn-secondary:hover {
            background: #e2e9ef;
        }

        .btn-same-address {
            background: #f2e7cf;
            color: #7a5c2a;
            border: 1px solid #e4cfad;
        }

        .btn-same-address:hover {
            background: #ecdbaa;
        }

        .status-message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 60px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
            display: none;
        }

        .status-error {
            background: #ffe6e5;
            color: #b13e3e;
        }

        .status-success {
            background: #e0f2e9;
            color: #1a6e5c;
        }

        .status-info {
            background: #e7f0ff;
            color: #1e5f8e;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 1rem;
            background: #f6fafd;
            color: #4f6f78;
            border-top: 1px solid #dce9ef;
        }

        .debug-panel {
            background: #f0f4f9;
            border-radius: 16px;
            padding: 12px;
            margin-top: 16px;
            font-size: 11px;
            font-family: monospace;
            display: none;
            border: 1px solid #cbd5e1;
        }

        @media (max-width: 650px) {
            body { padding: 1rem; }
            .form-body { padding: 1.5rem; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <h1><i class="fas fa-hotel"></i> Cadastro FNRH · Hóspede</h1>
        <div class="lgpd-badge">
            <i class="fas fa-shield-alt"></i> LGPD · Turismo responsável
        </div>
    </div>

    <div class="form-body">
        <form id="guestForm">
            <div class="form-row">
                <div class="form-group full-width">
                    <label><i class="fas fa-user-circle"></i> Nome completo *</label>
                    <input type="text" id="nome" placeholder="Ex: Ana Beatriz da Silva" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-globe-americas"></i> País</label>
                    <input type="text" id="pais" value="Brasil" readonly style="background:#f3f6f9;">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-calendar-alt"></i> Data Nascimento</label>
                    <input type="date" id="dtNascimento">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Tipo de Hóspede</label>
                    <select id="tipoHospede">
                        <option value="Individual">Individual</option>
                        <option value="Família">Família</option>
                        <option value="Grupo">Grupo</option>
                        <option value="Corporativo">Corporativo</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> E-mail *</label>
                    <input type="email" id="email" placeholder="hospede@exemplo.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone-alt"></i> Contato / WhatsApp</label>
                    <input type="tel" id="contato" placeholder="(11) 91234-5678">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group full-width">
                    <label><i class="fas fa-heart"></i> Preferências / Atenções / Relação com hóspedes</label>
                    <textarea id="atencaoPreferencia" rows="2" placeholder="Ex: restrições alimentares, mobilidade reduzida, acompanhante especial..."></textarea>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group full-width checkbox-group">
                    <label>
                        <i class="fas fa-share-alt"></i>
                        <input type="checkbox" id="autorizaTerceiros">
                        Autorizo a divulgação dos meus dados a serviços terceiros (parceiros turísticos), conforme política de privacidade.
                    </label>
                </div>
            </div>

            <div class="section-title"><i class="fas fa-file-invoice"></i> Endereço Fiscal</div>
            <div class="form-row">
                <div class="form-group full-width">
                    <label><i class="fas fa-home"></i> Tipo de endereço</label>
                    <select id="tipoEndereco">
                        <option value="Endereço Próprio">Endereço Próprio</option>
                        <option value="Alugado">Alugado</option>
                        <option value="Compartilhado">Compartilhado</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group"><label>Logradouro *</label><input type="text" id="logradouro" required></div>
                <div class="form-group"><label>Bairro</label><input type="text" id="bairro"></div>
            </div>

            <div class="form-row">
                <div class="form-group"><label>Localidade (Cidade)</label><input type="text" id="localidade"></div>
                <div class="form-group"><label>CEP</label><input type="text" id="cep"></div>
                <div class="form-group"><label>UF</label><input type="text" id="uf"></div>
            </div>

            <div id="statusMsg" class="status-message"></div>
            
            <div class="buttons-bar">
                <button type="button" class="btn btn-secondary" id="cancelBtn"><i class="fas fa-times"></i> Cancelar</button>
                <button type="button" class="btn btn-same-address" id="sameAddressBtn"><i class="fas fa-copy"></i> Salvar e criar c/ mesmo endereço</button>
                <button type="submit" class="btn btn-primary" id="submitBtn"><i class="fas fa-paper-plane"></i> SALVAR</button>
            </div>
        </form>
    </div>
    <footer>
        <i class="fas fa-database"></i> Dados protegidos conforme Lei Geral de Proteção de Dados (LGPD) - Finalidade exclusiva para reservas e contato turístico.
    </footer>
</div>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
    // ============================================================
    // CREDENCIAIS FORNECIDAS
    // ============================================================
    const EMAILJS_SERVICE_ID = "service_z494cwe";
    const EMAILJS_TEMPLATE_ID = "template_8s0mi58";
    const EMAILJS_PUBLIC_KEY = "rRvJZoganPcB0H4x3";
    
    let emailJSReady = false;
    let lastErrorDetail = "";

    // Inicialização com validação robusta
    (function initEmailJS() {
        if (!EMAILJS_PUBLIC_KEY || EMAILJS_PUBLIC_KEY.length < 10) {
            console.error("Chave pública inválida");
            showMessage("❌ Configuração do EmailJS: chave pública inválida.", true);
            return;
        }
        try {
            emailjs.init(EMAILJS_PUBLIC_KEY);
            emailJSReady = true;
            console.log("✅ EmailJS inicializado com sucesso. Service:", EMAILJS_SERVICE_ID, "Template:", EMAILJS_TEMPLATE_ID);
            showMessage("✅ Sistema de envio pronto. Preencha os dados e clique em SALVAR.", false, 4000);
        } catch (err) {
            console.error("Falha crítica EmailJS:", err);
            emailJSReady = false;
            lastErrorDetail = err.message || "Erro de inicialização";
            showMessage(`⚠️ Erro ao iniciar serviço de e-mail: ${lastErrorDetail}. Verifique sua chave pública.`, true);
        }
    })();

    function showMessage(msg, isError = false, autoHideMs = 5000) {
        const statusDiv = document.getElementById("statusMsg");
        statusDiv.style.display = "block";
        statusDiv.textContent = msg;
        statusDiv.classList.remove("status-success", "status-error", "status-info");
        if (isError) statusDiv.classList.add("status-error");
        else statusDiv.classList.add("status-success");
        statusDiv.scrollIntoView({ behavior: "smooth", block: "nearest" });
        if (autoHideMs > 0) {
            setTimeout(() => {
                if (statusDiv.style.display === "block") {
                    statusDiv.style.opacity = "0";
                    setTimeout(() => {
                        statusDiv.style.display = "none";
                        statusDiv.style.opacity = "1";
                    }, 400);
                }
            }, autoHideMs);
        }
    }

    function getFormData() {
        const nome = document.getElementById("nome").value.trim();
        const email = document.getElementById("email").value.trim();
        const logradouro = document.getElementById("logradouro").value.trim();

        if (!nome) { showMessage("❌ Nome completo é obrigatório.", true); return null; }
        if (!email) { showMessage("❌ E-mail é obrigatório.", true); return null; }
        if (!email.match(/^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/)) { showMessage("❌ E-mail inválido.", true); return null; }
        if (!logradouro) { showMessage("❌ Logradouro (Endereço Fiscal) é obrigatório.", true); return null; }

        // Formatar data de nascimento para exibição amigável
        let dataNascRaw = document.getElementById("dtNascimento").value;
        let dataNascFormatada = dataNascRaw ? new Date(dataNascRaw).toLocaleDateString('pt-BR') : "Não informada";
        
        return {
            nome_hospede: nome,
            pais: document.getElementById("pais").value,
            data_nascimento: dataNascFormatada,
            tipo_hospede: document.getElementById("tipoHospede").value,
            email_hospede: email,
            contato: document.getElementById("contato").value || "Não informado",
            preferencias: document.getElementById("atencaoPreferencia").value || "Nenhuma observação",
            autoriza_terceiros: document.getElementById("autorizaTerceiros").checked ? "Sim, autorizo a divulgação" : "Não autorizo",
            tipo_endereco: document.getElementById("tipoEndereco").value,
            logradouro: logradouro,
            bairro: document.getElementById("bairro").value || "",
            localidade: document.getElementById("localidade").value || "",
            cep: document.getElementById("cep").value || "",
            uf: document.getElementById("uf").value || "",
            data_envio: new Date().toLocaleString('pt-BR'),
            mensagem_extra: "Cadastro via formulário FNRH Turismo - Conformidade LGPD"
        };
    }

    // Função de envio com tratamento detalhado de erro
    async function sendViaEmailJS(formData) {
        if (!emailJSReady) {
            showMessage("⚠️ Serviço de e-mail não disponível. Recarregue a página ou contate suporte.", true);
            return false;
        }

        // Parâmetros idênticos ao template EmailJS sugerido (todos os campos)
        const templateParams = {
            nome_hospede: formData.nome_hospede,
            pais: formData.pais,
            data_nascimento: formData.data_nascimento,
            tipo_hospede: formData.tipo_hospede,
            email_hospede: formData.email_hospede,
            contato: formData.contato,
            preferencias: formData.preferencias,
            autoriza_terceiros: formData.autoriza_terceiros,
            tipo_endereco: formData.tipo_endereco,
            logradouro: formData.logradouro,
            bairro: formData.bairro,
            localidade: formData.localidade,
            cep: formData.cep,
            uf: formData.uf,
            data_envio: formData.data_envio,
            mensagem_extra: formData.mensagem_extra,
            // Campos extras para compatibilidade
            to_name: "Equipe FNRH",
            from_name: formData.nome_hospede,
            reply_to: formData.email_hospede
        };

        console.log("Enviando para EmailJS:", { service: EMAILJS_SERVICE_ID, template: EMAILJS_TEMPLATE_ID, params: templateParams });

        try {
            const response = await emailjs.send(
                EMAILJS_SERVICE_ID,
                EMAILJS_TEMPLATE_ID,
                templateParams
            );
            console.log("Resposta completa do EmailJS:", response);
            if (response.status === 200) {
                return true;
            } else {
                console.error("Status inesperado:", response.status, response.text);
                lastErrorDetail = `Status ${response.status}: ${response.text || "Erro desconhecido"}`;
                return false;
            }
        } catch (error) {
            console.error("Exceção no EmailJS:", error);
            // Captura mensagens comuns de erro
            if (error.text) lastErrorDetail = error.text;
            else if (error.message) lastErrorDetail = error.message;
            else lastErrorDetail = "Falha na comunicação com o serviço de e-mail";
            
            // Sugestões amigáveis
            if (lastErrorDetail.includes("template") || lastErrorDetail.includes("not found")) {
                lastErrorDetail += " — Verifique se o Template ID 'template_8s0mi58' existe na sua conta e está ativo.";
            } else if (lastErrorDetail.includes("service")) {
                lastErrorDetail += " — Confirme se o Service ID 'service_z494cwe' está correto e vinculado a um e-mail de destino.";
            } else if (lastErrorDetail.includes("unauthorized") || lastErrorDetail.includes("key")) {
                lastErrorDetail += " — Chave pública inválida ou sem permissão. Verifique no dashboard do EmailJS.";
            }
            return false;
        }
    }

    async function handleSave(keepAddress = false) {
        const formData = getFormData();
        if (!formData) return false;

        // Desabilitar botões temporariamente (evitar duplo envio)
        const submitBtn = document.getElementById("submitBtn");
        const sameAddrBtn = document.getElementById("sameAddressBtn");
        const originalSubmitText = submitBtn.innerHTML;
        const originalSameText = sameAddrBtn.innerHTML;
        submitBtn.disabled = true;
        sameAddrBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Enviando...';
        
        try {
            const success = await sendViaEmailJS(formData);
            if (success) {
                showMessage("✅ Dados enviados com sucesso! O e-mail foi encaminhado para o setor de turismo FNRH.", false);
                if (!keepAddress) {
                    resetFormFields(false);
                } else {
                    resetFormFields(true);
                }
                return true;
            } else {
                showMessage(`❌ Falha ao enviar: ${lastErrorDetail}`, true);
                return false;
            }
        } finally {
            submitBtn.disabled = false;
            sameAddrBtn.disabled = false;
            submitBtn.innerHTML = originalSubmitText;
            sameAddrBtn.innerHTML = originalSameText;
        }
    }

    function resetFormFields(keepAddress = false) {
        if (!keepAddress) {
            document.getElementById("nome").value = "";
            document.getElementById("dtNascimento").value = "";
            document.getElementById("tipoHospede").value = "Individual";
            document.getElementById("email").value = "";
            document.getElementById("contato").value = "";
            document.getElementById("atencaoPreferencia").value = "";
            document.getElementById("autorizaTerceiros").checked = false;
            document.getElementById("tipoEndereco").value = "Endereço Próprio";
            document.getElementById("logradouro").value = "";
            document.getElementById("bairro").value = "";
            document.getElementById("localidade").value = "";
            document.getElementById("cep").value = "";
            document.getElementById("uf").value = "";
        } else {
            // Preserva endereço
            const savedLog = document.getElementById("logradouro").value;
            const savedBairro = document.getElementById("bairro").value;
            const savedLocal = document.getElementById("localidade").value;
            const savedCep = document.getElementById("cep").value;
            const savedUf = document.getElementById("uf").value;
            const savedTipoEnd = document.getElementById("tipoEndereco").value;
            
            document.getElementById("nome").value = "";
            document.getElementById("dtNascimento").value = "";
            document.getElementById("tipoHospede").value = "Individual";
            document.getElementById("email").value = "";
            document.getElementById("contato").value = "";
            document.getElementById("atencaoPreferencia").value = "";
            document.getElementById("autorizaTerceiros").checked = false;
            
            document.getElementById("logradouro").value = savedLog;
            document.getElementById("bairro").value = savedBairro;
            document.getElementById("localidade").value = savedLocal;
            document.getElementById("cep").value = savedCep;
            document.getElementById("uf").value = savedUf;
            document.getElementById("tipoEndereco").value = savedTipoEnd;
        }
        document.getElementById("nome").focus();
        const statusDiv = document.getElementById("statusMsg");
        statusDiv.style.display = "none";
    }

    // Event listeners
    document.getElementById("guestForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        await handleSave(false);
    });

    document.getElementById("sameAddressBtn").addEventListener("click", async () => {
        await handleSave(true);
    });

    document.getElementById("cancelBtn").addEventListener("click", () => {
        resetFormFields(false);
        showMessage("Formulário limpo. Nenhum dado foi enviado.", false, 3000);
    });

    // Exibir orientação para configurar template corretamente
    window.addEventListener("load", () => {
        console.log("Formulário FNRH carregado. Credenciais EmailJS configuradas.");
        // Se não houver inicialização, mostrar help
        if (!emailJSReady) {
            const helpDiv = document.createElement("div");
            helpDiv.style.background = "#fff3cd";
            helpDiv.style.padding = "12px";
            helpDiv.style.borderRadius = "20px";
            helpDiv.style.marginBottom = "16px";
            helpDiv.style.fontSize = "13px";
            helpDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> <strong>Configuração do EmailJS:</strong> 
            Verifique se o template <strong>template_8s0mi58</strong> existe e contém TODAS as variáveis: 
            nome_hospede, pais, data_nascimento, tipo_hospede, email_hospede, contato, preferencias, autoriza_terceiros,
            tipo_endereco, logradouro, bairro, localidade, cep, uf, data_envio, mensagem_extra.<br><br>
            <strong>Service ID:</strong> service_z494cwe deve estar ativo com um e-mail de destino configurado.`;
            document.querySelector(".form-body").prepend(helpDiv);
        } else {
            // Pequeno aviso positivo
            const toastInfo = document.createElement("div");
            toastInfo.style.background = "#e0f2e9";
            toastInfo.style.padding = "8px 16px";
            toastInfo.style.borderRadius = "40px";
            toastInfo.style.marginBottom = "15px";
            toastInfo.style.fontSize = "12px";
            toastInfo.style.textAlign = "center";
            toastInfo.innerHTML = "📧 <strong>EmailJS conectado</strong> — Os dados serão enviados para o e-mail vinculado ao Service ID.";
            document.querySelector(".form-body").insertBefore(toastInfo, document.getElementById("guestForm"));
            setTimeout(() => toastInfo.remove(), 5000);
        }
    });
</script>

<!-- INSTRUÇÕES EMBUTIDAS PARA O TEMPLATE DO EMAILJS -->
<div style="display: none;" id="templateGuide">
    <!-- 
    ========== COPIAR PARA O TEMPLATE DO EMAILJS ==========
    Use o conteúdo abaixo no editor HTML do template_8s0mi58
    
    <h2>🏨 Novo Cadastro FNRH Turismo</h2>

    <p><strong>País:</strong> {{pais}}</p>
    <p><strong>Data Nascimento:</strong> {{data_nascimento}}</p>
    <p><strong>Tipo Hóspede:</strong> {{tipo_hospede}}</p>
    <p><strong>E-mail:</strong> {{email_hospede}}</p>
    <p><strong>Contato:</strong> {{contato}}</p>
    <p><strong>Preferências/Atenções:</strong> {{preferencias}}</p>
    <p><strong>Autoriza Terceiros:</strong> {{autoriza_terceiros}}</p>
    <p><strong>Endereço Fiscal:</strong> {{tipo_endereco}}<br>
    {{logradouro}}, {{bairro}} - {{localidade}}/{{uf}} - CEP: {{cep}}</p>
    <p><strong>Data Envio:</strong> {{data_envio}}</p>
    <p><em>{{mensagem_extra}}</em></p>
    -->
</div>
</body>
</html>
